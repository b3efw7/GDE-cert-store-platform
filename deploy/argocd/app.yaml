apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-store-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/b3efw7/GDE-cert-store-platform.git
    targetRevision: main
    path: deploy/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true