apiVersion: apps/v1
kind: Deployment
metadata:
  name: cert-store-api
  labels:
    app: cert-store-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cert-store-api
  template:
    metadata:
      labels:
        app: cert-store-api
    spec:
      containers:
        - name: cert-store-api
          image: ghcr.io/b3efw7/cert-store-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: cert-store-api-service
spec:
  selector:
    app: cert-store-api
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
---