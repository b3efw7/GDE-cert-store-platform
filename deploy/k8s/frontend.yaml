apiVersion: apps/v1
kind: Deployment
metadata:
  name: cert-store-ui
  labels:
    app: cert-store-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cert-store-ui
  template:
    metadata:
      labels:
        app: cert-store-ui
    spec:
      containers:
        - name: cert-store-ui
          image: ghcr.io/b3efw7/cert-store-ui:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: cert-store-ui-service
spec:
  selector:
    app: cert-store-ui
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP