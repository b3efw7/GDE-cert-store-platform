name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-backend:
    name: Build backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up .NET 9 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore backend dependencies
        run: dotnet restore ./backend/cert-store-api/cert-store-api.csproj

      - name: Build backend project
        run: dotnet build ./backend/cert-store-api/cert-store-api.csproj --configuration Release --no-restore

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: npm ci
        working-directory: ./frontend/cert-store-ui

      - name: Build frontend project
        run: npm run build
        working-directory: ./frontend/cert-store-ui

  docker-build-backend:
    name: Docker build and push backend
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend/cert-store-api
          file: ./backend/cert-store-api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/cert-store-api:latest

  docker-build-frontend:
    name: Docker build and push frontend
    runs-on: ubuntu-latest
    needs: build-frontend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/cert-store-ui
          file: ./frontend/cert-store-ui/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/cert-store-ui:latest